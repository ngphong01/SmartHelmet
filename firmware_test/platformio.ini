[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

board_build.partitions = min_spiffs.csv

upload_port = COM7
monitor_port = COM7
monitor_speed = 115200
upload_speed = 921600

lib_deps =
  arduinoFFT@1.5.6
  h2zero/NimBLE-Arduino @ ^1.4.2
  bblanchon/ArduinoJson @ ^6.21.0
  witnessmenow/UniversalTelegramBot @ ^1.3.0
monitor_filters = time
