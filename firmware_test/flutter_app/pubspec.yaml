name: smart_helmet
description: Smart Helmet - App kết nối mũ bảo hiểm thông minh qua BLE
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_plus: ^1.32.0
  audioplayers: ^6.0.0
  vibration: ^3.1.0
  url_launcher: ^6.2.0
  geolocator: ^11.0.0
  permission_handler: ^11.0.0
  wakelock_plus: ^1.6.0
  flutter_local_notifications: ^17.0.0
  android_intent_plus: ^5.0.0
  flutter_tts: ^4.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
