name: smart_helmet_app
description: Ứng dụng điều khiển Mũ Bảo Hiểm Thông Minh qua BLE + GPS
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # BLE - Nordic UART Service
  flutter_blue_plus: ^1.32.0

  # Bản đồ OpenStreetMap (miễn phí, không cần API key)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # State management
  provider: ^6.1.2

  # GPS device (lấy vị trí điện thoại)
  geolocator: ^12.0.0

  # Gọi điện thoại khẩn cấp
  url_launcher: ^6.3.0

  # Cupertino icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
